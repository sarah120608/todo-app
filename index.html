<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 24px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }

    input[type="text"]:focus { border-color: #4f46e5; }

    button.add-btn {
      padding: 10px 18px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    button.add-btn:hover { background: #4338ca; }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      margin-bottom: 10px;
      background: #f9f9f9;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    li.completed .task-title {
      text-decoration: line-through;
      color: #aaa;
    }

    .task-title { font-size: 15px; color: #333; flex: 1; }

    .actions { display: flex; gap: 8px; }

    button.done-btn {
      padding: 6px 12px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    button.del-btn {
      padding: 6px 12px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    p.empty {
      text-align: center;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 To-Do List</h1>
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Enter a new task..." />
      <button class="add-btn" onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
    <p class="empty" id="emptyMsg">No tasks yet. Add one above!</p>
  </div>

  <script>
    const API = 'http://127.0.0.1:5000';

    async function loadTasks() {
      const res = await fetch(`${API}/tasks`);
      const tasks = await res.json();
      renderTasks(tasks);
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      if (!title) return alert('Please enter a task!');
      await fetch(`${API}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      loadTasks();
    }

    async function completeTask(id) {
      await fetch(`${API}/tasks/${id}`, { method: 'PUT' });
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
      loadTasks();
    }

    function renderTasks(tasks) {
      const list = document.getElementById('taskList');
      const empty = document.getElementById('emptyMsg');
      list.innerHTML = '';
      empty.style.display = tasks.length === 0 ? 'block' : 'none';
      tasks.forEach(task => {
        const li = document.createElement('li');
        if (task.completed) li.classList.add('completed');
        li.innerHTML = `
          <span class="task-title">${task.title}</span>
          <div class="actions">
            ${!task.completed ? `<button class="done-btn" onclick="completeTask(${task.id})">✓ Done</button>` : ''}
            <button class="del-btn" onclick="deleteTask(${task.id})">🗑 Delete</button>
          </div>`;
        list.appendChild(li);
      });
    }

    document.getElementById('taskInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
  </script>
</body>
</html>
